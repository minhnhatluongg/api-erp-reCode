services:
  erp-portal-api:
    container_name: erp-portal-api
    build:
      context: .
      dockerfile: Dockerfile
    image: erp-portal-api:latest
    restart: unless-stopped
    ports:
      - "5000:80"   # host:container (HTTP)
      # - "5001:443" # mở dòng này nếu bật HTTPS trực tiếp trong container

    # ──────────────────────────────────────────────────────────────────────────
    # CẤU HÌNH: dùng appsettings.json mount vào container (không cần .env).
    #   - Toàn bộ config (ConnectionStrings, Jwt, SMTP, WinInvoice...) đọc từ file
    #     appsettings.json được mount ở phần "volumes" bên dưới.
    #   - Chỉ giữ lại vài ENV bắt buộc khác biệt giữa máy Windows và container Linux.
    # ──────────────────────────────────────────────────────────────────────────
    environment:
      # ---- Runtime (thuộc container, không phải app config) ----
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:80
      DOTNET_RUNNING_IN_CONTAINER: "true"
      TZ: Asia/Ho_Chi_Minh

      # ---- Override path Windows trong appsettings.json -> path Linux trong container ----
      # App đọc key "FileUpload:PhysicalRootPath" (FileController/FileStorageService...).
      # appsettings.json để "D:\IIS WEB\..." (Windows) nên BẮT BUỘC override khi chạy Linux.
      FileUpload__PhysicalRootPath: /app/Attachments
      # EContractLogConfig:LogPath trong appsettings là path tương đối ("Logs/EContract")
      # -> tự resolve thành /app/Logs/EContract trong container, không cần override.

    volumes:
      # Mount file config thật vào container (read-only). Đây là cách #2.
      # Sửa appsettings.json ở host -> restart container là cập nhật, không cần build lại.
      - ./ERP_Portal_RC/appsettings.json:/app/appsettings.json:ro
      # Dữ liệu cần persist
      - ./data/attachments:/app/Attachments
      - ./data/logs:/app/Logs
      - ./data/uploads:/app/Uploads
      # - ./certs:/https:ro   # mở dòng này nếu bật HTTPS trực tiếp trong container

    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:80/swagger/v1/swagger.json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  erp-network:
    driver: bridge
